name: chat-deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: chat-deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4
        with:
          server: ${{ secrets.CHAT_FTP_HOST }}
          username: ${{ secrets.CHAT_FTP_USER }}
          password: ${{ secrets.CHAT_FTP_PASS }}
          server-dir: /public_html/drsp.cc/chat/
          local-dir: ./
          exclude: |
            **/.git*
            **/.github*
            **/.DS_Store
            **/AGENTS.md
            **/CSS_RULES_V1.md
            **/DESIGN_chat.md
